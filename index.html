<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lancha Loca PRO</title>
<style>
  body { margin:0; overflow:hidden; background:#0b1d2a; font-family:sans-serif;}
  canvas { display:block; }
  #hud {
    position:fixed; top:10px; left:10px; color:white;
    font-size:18px; z-index:10;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div>Puntos: <span id="score">0</span></div>
  <div>Nivel: <span id="level">1</span></div>
  <div>❤️ <span id="lives">3</span></div>
  <div id="best"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ── GAME STATE ─────────────────────────────────
let boat, items, particles;
let score=0, level=1, lives=3;
let spawnTimer=0, spawnInterval=80;
let gameOver=false;
let frame=0;

// récord
let best = localStorage.getItem("bestScore") || 0;
document.getElementById("best").textContent = "🏆 " + best;

// ── BOAT ───────────────────────────────────────
function init(){
  boat = {x:W/2,y:H-150,vx:0,vy:0,w:40,h:60};
  items = [];
  particles = [];
  score=0; level=1; lives=3;
  spawnInterval=80;
  gameOver=false;
}

init();

// ── INPUT ──────────────────────────────────────
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// ── SPAWN ──────────────────────────────────────
function spawn(){
  let type = Math.random();

  if(type < 0.7){
    // pez
    items.push({
      kind:"fish",
      x:Math.random()*W,
      y:-50,
      vx:(Math.random()-0.5)*3,
      vy:2+Math.random()*2 + level*0.3,
      pts:10,
      move: ["normal","zigzag","chase"][Math.floor(Math.random()*3)]
    });
  } else {
    // obstáculo
    items.push({
      kind:"rock",
      x:Math.random()*W,
      y:-50,
      vy:3+level*0.4,
      w:40,h:40
    });
  }
}

// ── MOVIMIENTOS ────────────────────────────────
function move(o){
  if(o.kind==="fish"){
    if(o.move==="zigzag"){
      o.x += Math.sin(frame*0.1)*3;
    }
    else if(o.move==="chase"){
      let dx = boat.x - o.x;
      let dy = boat.y - o.y;
      let ang = Math.atan2(dy,dx);
      o.x += Math.cos(ang)*1.5;
      o.y += Math.sin(ang)*1.5;
      return;
    }
    o.y += o.vy;
    o.x += o.vx;
  } else {
    o.y += o.vy;
  }
}

// ── COLISIÓN MEJORADA ─────────────────────────
function collide(a,b){
  let dx = a.x - b.x;
  let dy = a.y - b.y;
  return Math.sqrt(dx*dx+dy*dy) < 30;
}

// ── EFECTOS ───────────────────────────────────
function explode(x,y,color){
  for(let i=0;i<10;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      life:40,
      color
    });
  }
}

function screenShake(){
  canvas.style.transform =
    `translate(${Math.random()*6-3}px,${Math.random()*6-3}px)`;
  setTimeout(()=>canvas.style.transform="translate(0,0)",80);
}

// ── UPDATE ─────────────────────────────────────
function update(){
  if(gameOver) return;

  frame++;
  spawnTimer++;

  if(spawnTimer > spawnInterval){
    spawn();
    spawnTimer=0;
  }

  // dificultad progresiva
  spawnInterval = Math.max(30, 80 - level*2);

  // movimiento barco
  if(keys["ArrowLeft"]) boat.vx -= 0.5;
  if(keys["ArrowRight"]) boat.vx += 0.5;
  if(keys["ArrowUp"]) boat.vy -= 0.5;
  if(keys["ArrowDown"]) boat.vy += 0.5;

  boat.vx *= 0.9;
  boat.vy *= 0.9;

  boat.x += boat.vx;
  boat.y += boat.vy;

  boat.x = Math.max(20, Math.min(W-20, boat.x));
  boat.y = Math.max(20, Math.min(H-20, boat.y));

  // items
  items.forEach(move);

  // colisiones
  items.forEach((o,i)=>{
    if(collide(boat,o)){
      if(o.kind==="fish"){
        score += o.pts;
        explode(o.x,o.y,"#00ffcc");
      } else {
        lives--;
        explode(o.x,o.y,"red");
        screenShake();
        if(navigator.vibrate) navigator.vibrate(100);
      }
      items.splice(i,1);
    }
  });

  // limpiar
  items = items.filter(o=>o.y < H+50);

  // partículas
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles = particles.filter(p=>p.life>0);

  // nivel
  if(score > level*200){
    level++;
  }

  // game over
  if(lives<=0){
    gameOver=true;
    if(score > best){
      localStorage.setItem("bestScore",score);
    }
    setTimeout(()=>alert("Game Over"),100);
  }

  // HUD
  document.getElementById("score").textContent = score;
  document.getElementById("level").textContent = level;
  document.getElementById("lives").textContent = lives;
}

// ── DRAW ──────────────────────────────────────
function draw(){
  ctx.fillStyle="#0b1d2a";
  ctx.fillRect(0,0,W,H);

  // agua simple
  ctx.fillStyle="#0f3050";
  for(let i=0;i<20;i++){
    ctx.fillRect(i*50,Math.sin(frame*0.05+i)*10+H/2,50,2);
  }

  // barco
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(boat.x,boat.y,15,0,Math.PI*2);
  ctx.fill();

  // items
  items.forEach(o=>{
    if(o.kind==="fish"){
      ctx.fillStyle="#00ffcc";
      ctx.beginPath();
      ctx.arc(o.x,o.y,10,0,Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle="#888";
      ctx.fillRect(o.x-15,o.y-15,30,30);
    }
  });

  // partículas
  particles.forEach(p=>{
    ctx.globalAlpha = p.life/40;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x,p.y,4,4);
    ctx.globalAlpha = 1;
  });
}

// ── LOOP ──────────────────────────────────────
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
