<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;background:#021e2f;font-family:sans-serif}
#hud{position:absolute;top:10px;left:10px;color:#fff}
#start{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:22px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
Puntos: <span id="score">0</span><br>
❤️ <span id="lives">3</span>
</div>

<div id="start">TOCAR PARA EMPEZAR</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let DPR = window.devicePixelRatio || 1;
let W,H;

function resize(){
  W = innerWidth;
  H = innerHeight;
  c.width = W*DPR;
  c.height = H*DPR;
  c.style.width = W+"px";
  c.style.height = H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
addEventListener("resize",resize);

// ─── GAME ─────────────────────
let started=false;
let score=0,lives=3;
let items=[];
let frame=0;

const boat={
  x:W/2,
  y:H-120,
  vx:0,vy:0
};

// ─── INPUT TOUCH ─────────────
let tx=null,ty=null;

addEventListener("touchstart",e=>{
  tx=e.touches[0].clientX;
  ty=e.touches[0].clientY;
  if(!started){
    started=true;
    document.getElementById("start").style.display="none";
  }
});

addEventListener("touchmove",e=>{
  tx=e.touches[0].clientX;
  ty=e.touches[0].clientY;
});

addEventListener("touchend",()=>{
  tx=null;ty=null;
});

// ─── SPAWN ───────────────────
function spawn(){
  let type=Math.random();

  if(type<0.7){
    items.push({
      type:"fish",
      x:Math.random()*W,
      y:-20,
      vy:2+Math.random()*2
    });
  }else{
    items.push({
      type:"rock",
      x:Math.random()*W,
      y:-20,
      vy:3
    });
  }
}

// ─── UPDATE ─────────────────
function update(){
  if(!started)return;

  frame++;
  if(frame%40===0)spawn();

  if(tx!==null){
    boat.vx+=(tx-boat.x)*0.01;
    boat.vy+=(ty-boat.y)*0.01;
  }

  boat.vx*=0.9;
  boat.vy*=0.9;
  boat.x+=boat.vx;
  boat.y+=boat.vy;

  boat.x=Math.max(30,Math.min(W-30,boat.x));
  boat.y=Math.max(60,Math.min(H-60,boat.y));

  items.forEach(o=>o.y+=o.vy);

  items=items.filter(o=>{
    let hit=Math.abs(o.x-boat.x)<25&&Math.abs(o.y-boat.y)<25;

    if(hit){
      if(o.type==="fish"){
        score+=10;
      }else{
        lives--;
      }
      document.getElementById("score").textContent=score;
      document.getElementById("lives").textContent=lives;
      return false;
    }

    return o.y<H+20;
  });
}

// ─── DRAW ──────────────────
function draw(){
  // agua
  let g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#06364d");
  g.addColorStop(1,"#021e2f");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);

  // olas
  ctx.strokeStyle="rgba(255,255,255,0.1)";
  ctx.beginPath();
  for(let i=0;i<W;i+=10){
    ctx.lineTo(i,H/2+Math.sin(i*0.02+frame*0.05)*5);
  }
  ctx.stroke();

  // peces
  items.forEach(o=>{
    if(o.type==="fish"){
      ctx.fillStyle="#2ee6c5";
      ctx.beginPath();
      ctx.ellipse(o.x,o.y,12,6,0,0,Math.PI*2);
      ctx.fill();
    }else{
      ctx.fillStyle="#888";
      ctx.fillRect(o.x-10,o.y-10,20,20);
    }
  });

  // lancha mejorada
  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.moveTo(boat.x,boat.y-20);
  ctx.lineTo(boat.x+15,boat.y+20);
  ctx.lineTo(boat.x-15,boat.y+20);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#ff3b3b";
  ctx.fillRect(boat.x-12,boat.y+5,24,5);
}

// ─── LOOP ──────────────────
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
