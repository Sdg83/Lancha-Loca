<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Lancha Loca</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#021e2f;
  touch-action:none;
}

#hud{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:sans-serif;
  font-size:14px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="hud">
  Puntos: <span id="score">0</span><br>
  Nivel: 1<br>
  ❤️ 3
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let DPR = window.devicePixelRatio || 1;
let W,H;

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;

  canvas.style.width = W + "px";
  canvas.style.height = H + "px";

  canvas.width = W * DPR;
  canvas.height = H * DPR;

  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener("resize", resize);

// ─── GAME ─────────────────────────
let score = 0;
let items = [];
let frame = 0;

const boat = {
  x: W/2,
  y: H-120,
  vx:0
};

// ─── INPUT TOUCH (IPHONE) ─────────
let touchX = null;

window.addEventListener("touchstart", e=>{
  touchX = e.touches[0].clientX;
});

window.addEventListener("touchmove", e=>{
  touchX = e.touches[0].clientX;
});

window.addEventListener("touchend", ()=>{
  touchX = null;
});

// ─── SPAWN ────────────────────────
function spawn(){
  items.push({
    x: Math.random()*W,
    y: -20,
    vy: 3,
    r: 8
  });
}

// ─── UPDATE ───────────────────────
function update(){
  frame++;

  if(frame%30===0) spawn();

  // mover lancha con touch
  if(touchX !== null){
    let dx = touchX - boat.x;
    boat.vx += dx * 0.01;
  }

  boat.vx *= 0.9;
  boat.x += boat.vx;

  // límites
  boat.x = Math.max(30, Math.min(W-30, boat.x));

  // objetos
  items.forEach(o=>{
    o.y += o.vy;
  });

  // colisiones
  items = items.filter(o=>{
    let hit = Math.abs(o.x - boat.x) < 20 &&
              Math.abs(o.y - boat.y) < 20;

    if(hit){
      score += 10;
      document.getElementById("score").textContent = score;
      return false;
    }

    return o.y < H+20;
  });
}

// ─── DRAW ─────────────────────────
function draw(){
  // fondo agua
  let grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,"#06364d");
  grad.addColorStop(1,"#021e2f");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // olas
  ctx.strokeStyle = "rgba(255,255,255,0.1)";
  ctx.beginPath();
  for(let i=0;i<W;i+=10){
    ctx.lineTo(i, H/2 + Math.sin(i*0.02 + frame*0.05)*5);
  }
  ctx.stroke();

  // peces (visibles)
  items.forEach(o=>{
    ctx.fillStyle="#2ee6c5";
    ctx.beginPath();
    ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
    ctx.fill();
  });

  // LANCHA (GRANDE Y VISIBLE)
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.moveTo(boat.x, boat.y-25);
  ctx.lineTo(boat.x+15, boat.y+20);
  ctx.lineTo(boat.x-15, boat.y+20);
  ctx.closePath();
  ctx.fill();
}

// ─── LOOP ─────────────────────────
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
