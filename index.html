<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lancha Loca</title>
<style>
  body{margin:0;overflow:hidden;background:#021e2f;font-family:sans-serif;color:white}
  #hud{position:absolute;top:10px;left:10px;font-size:14px}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  Puntos: <span id="score">0</span><br>
  Nivel: <span id="level">1</span><br>
  ❤️ <span id="lives">3</span>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ─── GAME STATE ─────────────────────
let score=0, level=1, lives=3;
let items=[];
let frame=0;

const boat = {
  x:0,
  y:0,
  vx:0,
  vy:0,
  w:40,
  h:60
};

// inicializar posición
boat.x = W/2;
boat.y = H-120;

// ─── INPUT ─────────────────────────
let keys={};

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")keys.left=true;
  if(e.key==="ArrowRight")keys.right=true;
});
document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")keys.left=false;
  if(e.key==="ArrowRight")keys.right=false;
});

// ─── SPAWN ─────────────────────────
function spawn(){
  items.push({
    x: Math.random()*W,
    y: -20,
    vy: 2 + Math.random()*2,
    size: 10
  });
}

// ─── UPDATE ────────────────────────
function update(){
  frame++;

  if(frame%40===0) spawn();

  // movimiento lancha
  if(keys.left) boat.vx -= 0.5;
  if(keys.right) boat.vx += 0.5;

  boat.vx *= 0.9;
  boat.x += boat.vx;

  // límites
  boat.x = Math.max(20, Math.min(W-20, boat.x));

  // mover objetos
  items.forEach(o=>{
    o.y += o.vy;
  });

  // colisiones
  items = items.filter(o=>{
    let hit = Math.abs(o.x - boat.x) < 20 &&
              Math.abs(o.y - boat.y) < 20;

    if(hit){
      score += 10;
      return false;
    }

    return o.y < H+20;
  });

  // HUD
  document.getElementById("score").textContent = score;
}

// ─── DRAW ──────────────────────────
function draw(){
  // fondo agua
  ctx.fillStyle = "#042c3a";
  ctx.fillRect(0,0,W,H);

  // olas simples
  ctx.strokeStyle="#0a4a66";
  ctx.beginPath();
  for(let i=0;i<W;i+=20){
    ctx.lineTo(i, H/2 + Math.sin(i*0.05+frame*0.05)*5);
  }
  ctx.stroke();

  // peces
  ctx.fillStyle="#2ee6c5";
  items.forEach(o=>{
    ctx.beginPath();
    ctx.arc(o.x,o.y,o.size,0,Math.PI*2);
    ctx.fill();
  });

  // lancha (simple pero visible)
  ctx.fillStyle="white";
  ctx.fillRect(boat.x-10, boat.y-20, 20, 40);
}

// ─── LOOP ──────────────────────────
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
