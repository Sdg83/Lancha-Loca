<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="round"><rect width="512" height="512" rx="112" ry="112"/></clipPath>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d4f8a"/>
      <stop offset="60%" stop-color="#1a7ec0"/>
      <stop offset="100%" stop-color="#3aa8e8"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565a8"/>
      <stop offset="100%" stop-color="#0a3560"/>
    </linearGradient>
    <radialGradient id="sunRad" cx="70%" cy="18%">
      <stop offset="0%"  stop-color="#fff9d0" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffe566" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hullWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5f8ff"/>
      <stop offset="60%"  stop-color="#dce8f5"/>
      <stop offset="100%" stop-color="#b8cce0"/>
    </linearGradient>
    <linearGradient id="deckBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2e7ab5"/>
      <stop offset="100%" stop-color="#1a5080"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#b8e8ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#60b8e0" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="motorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a4060"/>
      <stop offset="100%" stop-color="#14182e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000820" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#000820" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#000820" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#round)">

    <!-- Sky -->
    <rect width="512" height="512" fill="url(#sky)"/>

    <!-- Sun -->
    <ellipse cx="380" cy="95" rx="110" ry="80" fill="url(#sunRad)"/>
    <circle cx="382" cy="92" r="40" fill="#fff9d0" opacity="0.96"/>
    <circle cx="382" cy="92" r="26" fill="#fffde8"/>

    <!-- Horizon glow -->
    <rect x="0" y="255" width="512" height="30" fill="#a0d8f8" opacity="0.2"/>

    <!-- Sea -->
    <rect x="0" y="272" width="512" height="240" fill="url(#sea)"/>

    <!-- Sun reflection on water -->
    <ellipse cx="380" cy="280" rx="70" ry="8" fill="#ffe88a" opacity="0.22"/>
    <rect x="340" y="278" width="80" height="100" fill="#ffe88a" opacity="0.04"/>

    <!-- Waves -->
    <g fill="none" stroke-linecap="round" opacity="0.5">
      <path d="M0 295 Q64 288 128 295 Q192 302 256 295 Q320 288 384 295 Q448 302 512 295" stroke="#b8e0ff" stroke-width="2.5"/>
      <path d="M0 318 Q80 312 160 318 Q240 324 320 318 Q400 312 512 318" stroke="#a0d0f0" stroke-width="2"/>
      <path d="M0 342 Q96 337 192 342 Q288 347 384 342 Q448 338 512 342" stroke="#90c8e8" stroke-width="1.8"/>
      <path d="M0 366 Q112 362 224 366 Q336 370 448 366 L512 366" stroke="#80c0e0" stroke-width="1.5"/>
      <path d="M0 392 Q128 389 256 392 Q384 395 512 392" stroke="#70b8d8" stroke-width="1.3"/>
      <path d="M0 418 Q144 416 288 418 Q400 420 512 418" stroke="#60b0d0" stroke-width="1.1"/>
      <path d="M0 445 Q160 443 320 445 Q420 447 512 445" stroke="#58a8c8" stroke-width="1"/>
    </g>

    <!-- ══════════════════════════════════
         BOAT — rear 3/4 view (popa)
         ══════════════════════════════════ -->
    <g filter="url(#shadow)">

      <!-- Boat shadow on water -->
      <ellipse cx="256" cy="318" rx="165" ry="18" fill="#000" opacity="0.22"/>

      <!-- ── HULL UNDERSIDE ── -->
      <path d="M 92 305 C 92 305 80 326 84 340 C 100 358 180 368 256 368 C 332 368 412 358 428 340 C 432 326 420 305 420 305 Z"
            fill="#0c1430"/>

      <!-- ── HULL MAIN (white fibreglass) ── -->
      <path d="M 92 305 L 420 305 L 410 285 L 385 270 L 127 270 L 102 285 Z"
            fill="url(#hullWhite)"/>

      <!-- Hull right shading -->
      <path d="M 320 270 L 410 285 L 420 305 L 300 305 Z" fill="#b0c0d8" opacity="0.35"/>

      <!-- Hull shine left -->
      <path d="M 105 288 L 200 278 L 195 305 L 98 305 Z" fill="#ffffff" opacity="0.28"/>

      <!-- ── RED STRIPE ── -->
      <path d="M 94 302 L 418 302 L 415 294 L 97 294 Z" fill="#d63c2e"/>
      <!-- Stripe highlight -->
      <path d="M 96 294 L 416 294 L 416 297 L 96 297 Z" fill="#ff7060" opacity="0.45"/>
      <!-- Stripe shadow -->
      <path d="M 95 300 L 417 300 L 417 302 L 95 302 Z" fill="#8a1810" opacity="0.35"/>

      <!-- ── DECK ── -->
      <path d="M 127 270 L 385 270 L 390 260 L 122 260 Z" fill="url(#deckBlue)"/>

      <!-- Deck planks texture -->
      <g stroke="#ffffff" stroke-width="1" opacity="0.08" stroke-linecap="round">
        <line x1="150" y1="260" x2="148" y2="270"/>
        <line x1="175" y1="260" x2="173" y2="270"/>
        <line x1="200" y1="260" x2="198" y2="270"/>
        <line x1="225" y1="260" x2="223" y2="270"/>
        <line x1="250" y1="260" x2="248" y2="270"/>
        <line x1="275" y1="260" x2="273" y2="270"/>
        <line x1="300" y1="260" x2="298" y2="270"/>
        <line x1="325" y1="260" x2="323" y2="270"/>
        <line x1="350" y1="260" x2="348" y2="270"/>
        <line x1="375" y1="260" x2="373" y2="270"/>
      </g>

      <!-- ── CABIN BODY ── -->
      <path d="M 168 260 L 344 260 L 348 200 L 296 185 L 216 185 L 164 200 Z"
            fill="#1c3c58"/>
      <!-- Cabin right face darker -->
      <path d="M 316 260 L 344 260 L 348 200 L 314 196 Z" fill="#122840" opacity="0.5"/>
      <!-- Cabin top -->
      <path d="M 172 200 L 340 198 L 340 192 L 172 194 Z" fill="#102030" opacity="0.6"/>

      <!-- ── WINDSHIELD ── -->
      <!-- Main glass panel -->
      <path d="M 172 258 L 340 258 L 338 198 L 174 200 Z" fill="url(#glassGrad)"/>
      <!-- Glass frame -->
      <path d="M 172 258 L 340 258 L 338 198 L 174 200 Z"
            fill="none" stroke="#d8f0ff" stroke-width="4.5" stroke-linejoin="round"/>
      <!-- Center divider -->
      <line x1="256" y1="258" x2="256" y2="199" stroke="#d8f0ff" stroke-width="3"/>
      <!-- Horizontal brace -->
      <line x1="175" y1="228" x2="338" y2="227" stroke="#d8f0ff" stroke-width="2" opacity="0.5"/>
      <!-- Left glass reflection -->
      <path d="M 178 254 L 210 254 L 209 203 L 178 205 Z" fill="#ffffff" opacity="0.20"/>
      <path d="M 180 240 L 208 240 L 208 230 L 180 231 Z" fill="#ffffff" opacity="0.12"/>
      <!-- Right glass faint reflection -->
      <path d="M 262 254 L 285 254 L 284 203 L 263 204 Z" fill="#ffffff" opacity="0.10"/>

      <!-- ── CONSOLE / DASHBOARD ── -->
      <rect x="216" y="245" width="80" height="14" rx="4" fill="#0a1828"/>
      <circle cx="232" cy="252" r="4" fill="#e63030"/>
      <circle cx="248" cy="252" r="3.5" fill="#f5a623"/>
      <circle cx="263" cy="252" r="3.5" fill="#28cc50"/>
      <rect x="270" y="248" width="20" height="8" rx="2" fill="#1a3050"/>

      <!-- ── MOTOR / ENGINE ── -->
      <path d="M 218 260 L 294 260 L 292 282 L 256 288 L 220 282 Z"
            fill="url(#motorGrad)"/>
      <!-- Motor detail -->
      <rect x="230" y="263" width="52" height="4" rx="2" fill="#4a5575" opacity="0.7"/>
      <rect x="235" y="270" width="42" height="3" rx="1.5" fill="#3a4560" opacity="0.6"/>
      <!-- Propeller shaft -->
      <rect x="248" y="285" width="16" height="22" rx="3" fill="#0c1225"/>
      <!-- Propeller blades -->
      <ellipse cx="256" cy="308" rx="28" ry="8" fill="#1a2040" opacity="0.85"/>
      <ellipse cx="256" cy="308" rx="18" ry="5" fill="#252a48"/>
      <circle cx="256" cy="308" r="5" fill="#3a4060"/>
      <circle cx="256" cy="308" r="2.5" fill="#555a80"/>

      <!-- ── RAILING ── -->
      <line x1="130" y1="260" x2="168" y2="260" stroke="#c8d8e8" stroke-width="3" stroke-linecap="round"/>
      <line x1="344" y1="260" x2="382" y2="260" stroke="#c8d8e8" stroke-width="3" stroke-linecap="round"/>
      <!-- Rail posts -->
      <line x1="140" y1="256" x2="140" y2="268" stroke="#c8d8e8" stroke-width="2.5"/>
      <line x1="155" y1="256" x2="155" y2="268" stroke="#c8d8e8" stroke-width="2.5"/>
      <line x1="357" y1="256" x2="357" y2="268" stroke="#c8d8e8" stroke-width="2.5"/>
      <line x1="372" y1="256" x2="372" y2="268" stroke="#c8d8e8" stroke-width="2.5"/>

      <!-- ── ANTENNA ── -->
      <line x1="285" y1="192" x2="292" y2="138" stroke="#90a8c0" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="292" cy="133" r="6" fill="#ff3838" opacity="0.92"/>
      <circle cx="292" cy="133" r="3.5" fill="#ff9090" opacity="0.8"/>
      <!-- Antenna glow -->
      <circle cx="292" cy="133" r="10" fill="#ff3838" opacity="0.15"/>

      <!-- ── NAV LIGHTS ── -->
      <!-- Port (red, left) -->
      <circle cx="112" cy="284" r="9" fill="#ff3030" opacity="0.9"/>
      <circle cx="112" cy="284" r="5.5" fill="#ff9090" opacity="0.8"/>
      <circle cx="112" cy="284" r="14" fill="#ff3030" opacity="0.12"/>
      <!-- Starboard (green, right) -->
      <circle cx="400" cy="284" r="9" fill="#30ee60" opacity="0.9"/>
      <circle cx="400" cy="284" r="5.5" fill="#90ffa8" opacity="0.8"/>
      <circle cx="400" cy="284" r="14" fill="#30ee60" opacity="0.12"/>

    </g><!-- end boat -->

    <!-- ── WAKE ── -->
    <g fill="none" stroke-linecap="round">
      <path d="M 88 312 Q 55 318 20 312" stroke="#ffffff" stroke-width="4.5" opacity="0.55"/>
      <path d="M 86 322 Q 48 330 12 323" stroke="#ffffff" stroke-width="3.5" opacity="0.38"/>
      <path d="M 90 332 Q 50 342 15 334" stroke="#ffffff" stroke-width="2.5" opacity="0.25"/>
      <path d="M 424 312 Q 457 318 492 312" stroke="#ffffff" stroke-width="4.5" opacity="0.55"/>
      <path d="M 426 322 Q 464 330 500 323" stroke="#ffffff" stroke-width="3.5" opacity="0.38"/>
      <path d="M 422 332 Q 462 342 497 334" stroke="#ffffff" stroke-width="2.5" opacity="0.25"/>
      <!-- Foam dots -->
      <circle cx="60" cy="315" r="3.5" fill="#ffffff" opacity="0.5"/>
      <circle cx="44" cy="322" r="3" fill="#ffffff" opacity="0.4"/>
      <circle cx="30" cy="328" r="2.5" fill="#ffffff" opacity="0.3"/>
      <circle cx="452" cy="315" r="3.5" fill="#ffffff" opacity="0.5"/>
      <circle cx="468" cy="322" r="3" fill="#ffffff" opacity="0.4"/>
      <circle cx="482" cy="328" r="2.5" fill="#ffffff" opacity="0.3"/>
    </g>

    <!-- ── FISH ── -->
    <!-- Orange fish left -->
    <g transform="translate(78,390)">
      <ellipse cx="0" cy="0" rx="24" ry="13" fill="#f4a261"/>
      <polygon points="-24,0 -37,-11 -37,11" fill="#d4722a"/>
      <path d="M 0 -10 Q 8 -20 14 -13" fill="#d4722a"/>
      <ellipse cx="9" cy="-3" rx="5.5" ry="5.5" fill="white"/>
      <circle cx="10" cy="-3" r="3.2" fill="#18182e"/>
      <circle cx="11" cy="-4.5" r="1.3" fill="white"/>
    </g>
    <!-- Teal fish right, facing left -->
    <g transform="translate(434,405) scale(-1,1)">
      <ellipse cx="0" cy="0" rx="22" ry="12" fill="#2ec4b6"/>
      <polygon points="-22,0 -34,-10 -34,10" fill="#1a8880"/>
      <path d="M 0 -9 Q 7 -18 13 -12" fill="#1a8880"/>
      <ellipse cx="8" cy="-3" rx="5" ry="5" fill="white"/>
      <circle cx="9" cy="-3" r="3" fill="#18182e"/>
      <circle cx="10" cy="-4" r="1.2" fill="white"/>
    </g>
    <!-- Pink fish small -->
    <g transform="translate(148,448)">
      <ellipse cx="0" cy="0" rx="17" ry="9" fill="#ff6b9d"/>
      <polygon points="-17,0 -27,-8 -27,8" fill="#cc3068"/>
      <path d="M 0 -7 Q 5 -14 10 -9" fill="#cc3068"/>
      <ellipse cx="6" cy="-2" rx="4" ry="4" fill="white"/>
      <circle cx="7" cy="-2" r="2.4" fill="#18182e"/>
    </g>
    <!-- Golden dorado, facing left -->
    <g transform="translate(364,442) scale(-1,1)">
      <ellipse cx="0" cy="0" rx="20" ry="11" fill="#f9c74f"/>
      <polygon points="-20,0 -32,-9 -32,9" fill="#c89010"/>
      <path d="M 0 -9 Q 7 -17 12 -11" fill="#c89010"/>
      <ellipse cx="7" cy="-3" rx="4.5" ry="4.5" fill="white"/>
      <circle cx="8" cy="-3" r="2.8" fill="#18182e"/>
      <circle cx="9" cy="-4" r="1.1" fill="white"/>
    </g>
    <!-- Blue small fish center -->
    <g transform="translate(256,432)">
      <ellipse cx="0" cy="0" rx="14" ry="8" fill="#5bc8f5"/>
      <polygon points="-14,0 -22,-7 -22,7" fill="#2890c0"/>
      <circle cx="5" cy="-2" rx="3.5" ry="3.5" fill="white"/>
      <circle cx="6" cy="-2" r="2" fill="#18182e"/>
    </g>
    <!-- Crab hint -->
    <g transform="translate(200, 460)" opacity="0.85">
      <ellipse cx="0" cy="0" rx="14" ry="9" fill="#e63946"/>
      <line x1="-14" y1="-4" x2="-22" y2="-12" stroke="#c02030" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-14" y1="4" x2="-22" y2="12" stroke="#c02030" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="14" y1="-4" x2="22" y2="-12" stroke="#c02030" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="14" y1="4" x2="22" y2="12" stroke="#c02030" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-6" cy="-5" r="3" fill="white"/>
      <circle cx="6" cy="-5" r="3" fill="white"/>
      <circle cx="-6" cy="-5" r="1.8" fill="#18182e"/>
      <circle cx="6" cy="-5" r="1.8" fill="#18182e"/>
    </g>

    <!-- ── TITLE ── -->
    <rect x="0" y="458" width="512" height="54" fill="url(#titleGrad)"/>
    <!-- Shadow text -->
    <text x="258" y="496"
      font-family="'Arial Black','Impact','Helvetica Neue',sans-serif"
      font-size="44" font-weight="900" text-anchor="middle"
      fill="#000820" opacity="0.55" dx="2" dy="2">LANCHA LOCA</text>
    <!-- Main text -->
    <text x="256" y="494"
      font-family="'Arial Black','Impact','Helvetica Neue',sans-serif"
      font-size="44" font-weight="900" text-anchor="middle"
      fill="#ffd740" letter-spacing="1.5">LANCHA LOCA</text>

  </g>
</svg>
